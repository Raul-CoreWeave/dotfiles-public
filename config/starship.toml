add_newline = true

[kubernetes]
format = "[☸︎ $context]($style) "
style = "blue"
disabled = false

# Add your own [[kubernetes.contexts]] blocks here to alias/recolor specific
# kube-context name patterns. Example:
#
#   [[kubernetes.contexts]]
#   context_pattern = "prod-.*"
#   context_alias   = "production"
#   style = "bold red"

[username]
style_user = "white"
style_root = "red bold"
format = "[$user]($style)[@](blue bold)"
disabled = false

[character]
success_symbol = "[»](bold green) "
error_symbol = "[✗](bold red) "
vicmd_symbol = "[«](bold green) "

